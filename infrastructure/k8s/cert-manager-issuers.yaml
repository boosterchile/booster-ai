# Wave 3 D3 — cert-manager Issuer + Certificate para el TLS endpoint
# del telemetry-tcp-gateway.
#
# Pre-requisito: cert-manager instalado en el cluster (helm install).
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set crds.enabled=true
#
# Decisión (brief D3): Let's Encrypt vía cert-manager.
# Razones:
#   - Gratuito.
#   - Auto-rotación 60-90 días sin intervención.
#   - Cadena pública confiable — devices Teltonika verifican contra
#     raíces Mozilla/curl built-in (LetsEncryptAuthorityX3 + ISRG Root X1).
#   - Sin lock-in con GCP (portable a otra cloud si fuera necesario).
#
# Alternativa descartada: Google-managed cert. Más simple para HTTPS
# (LB managed) pero NO soporta TCP/Network LB para protocolos custom
# como Codec 8 sobre TLS.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # ACME endpoint producción — Let's Encrypt.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dev@boosterchile.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    # DNS-01 challenge porque el endpoint TLS usa Network LB sin HTTP/80.
    # cert-manager crea el TXT record _acme-challenge.{domain} via Cloud
    # DNS, Let's Encrypt lo verifica, cert-manager renueva.
    solvers:
      - dns01:
          cloudDNS:
            project: booster-ai-494222
            # Workload Identity: el K8s SA `cert-manager` (anotado con
            # iam.gke.io/gcp-service-account=cert-manager-cloud-dns@...)
            # impersona al GCP SA `cert-manager-cloud-dns` que tiene
            # roles/dns.admin sobre la zona. cert-manager pide
            # credentials al metadata server del nodo, no necesita
            # serviceAccountSecretRef. Setup en infrastructure/wave-3-tls.tf.
        selector:
          dnsZones:
            - boosterchile.com
---
# Issuer staging (Let's Encrypt staging) — para tests sin consumir
# rate limits del prod (50 certs/week por dominio principal). Cambiar
# `letsencrypt-prod` por `letsencrypt-staging` en el spec.issuerRef del
# Certificate de abajo cuando estemos validando.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: dev@boosterchile.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudDNS:
            project: booster-ai-494222
            # Mismo Workload Identity que letsencrypt-prod.
        selector:
          dnsZones:
            - boosterchile.com
---
# NOTA: Los Certificate por cluster se movieron a archivos separados
# para que cada cluster aplique solo el suyo:
#   - cert-primary.yaml → CN telemetry-tls.boosterchile.com (primary)
#   - cert-dr.yaml      → CN telemetry-dr.boosterchile.com  (DR)
# Este archivo contiene SOLO los ClusterIssuers — se aplica en ambos
# clusters porque ClusterIssuer es un recurso cluster-scoped (no
# namespaced) que cert-manager necesita resolver al issuer.
