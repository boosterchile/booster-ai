# Wave 3 D3 — cert-manager Issuer + Certificate para el TLS endpoint
# del telemetry-tcp-gateway.
#
# Pre-requisito: cert-manager instalado en el cluster (helm install).
#   helm repo add jetstack https://charts.jetstack.io
#   helm install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set crds.enabled=true
#
# Decisión (brief D3): Let's Encrypt vía cert-manager.
# Razones:
#   - Gratuito.
#   - Auto-rotación 60-90 días sin intervención.
#   - Cadena pública confiable — devices Teltonika verifican contra
#     raíces Mozilla/curl built-in (LetsEncryptAuthorityX3 + ISRG Root X1).
#   - Sin lock-in con GCP (portable a otra cloud si fuera necesario).
#
# Alternativa descartada: Google-managed cert. Más simple para HTTPS
# (LB managed) pero NO soporta TCP/Network LB para protocolos custom
# como Codec 8 sobre TLS.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    # ACME endpoint producción — Let's Encrypt.
    server: https://acme-v02.api.letsencrypt.org/directory
    email: dev@boosterchile.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    # DNS-01 challenge porque el endpoint TLS usa Network LB sin HTTP/80.
    # cert-manager crea el TXT record _acme-challenge.{domain} via Cloud
    # DNS, Let's Encrypt lo verifica, cert-manager renueva.
    solvers:
      - dns01:
          cloudDNS:
            project: booster-ai-494222
            # cert-manager corre con SA dedicada con role
            # roles/dns.admin sobre la zona. Configurada via
            # Workload Identity en el namespace cert-manager.
            serviceAccountSecretRef:
              name: cert-manager-cloud-dns
              key: key.json
        selector:
          dnsZones:
            - boosterchile.com
---
# Issuer staging (Let's Encrypt staging) — para tests sin consumir
# rate limits del prod (50 certs/week por dominio principal). Cambiar
# `letsencrypt-prod` por `letsencrypt-staging` en el spec.issuerRef del
# Certificate de abajo cuando estemos validando.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: dev@boosterchile.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - dns01:
          cloudDNS:
            project: booster-ai-494222
            serviceAccountSecretRef:
              name: cert-manager-cloud-dns
              key: key.json
        selector:
          dnsZones:
            - boosterchile.com
---
# Certificate del TLS endpoint del gateway. cert-manager lo renueva
# 30 días antes de expirar (default). El Secret resultante
# `telemetry-tls-cert` se monta en el pod del gateway via volume.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: telemetry-tls-cert
  namespace: telemetry
spec:
  secretName: telemetry-tls-cert
  # 90 días = max permitido por Let's Encrypt. cert-manager renueva
  # cuando queden 30 días (default).
  duration: 2160h # 90d
  renewBefore: 720h # 30d
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  # CN + SAN — el device pinea contra `telemetry-tls.boosterchile.com`.
  # El alias `telemetry.boosterchile.com` se mantiene apuntando al LB
  # plain durante la migración.
  commonName: telemetry-tls.boosterchile.com
  dnsNames:
    - telemetry-tls.boosterchile.com
  privateKey:
    algorithm: RSA
    size: 2048
    rotationPolicy: Always
  # Usage estándar para server cert. No client auth.
  usages:
    - server auth
    - digital signature
    - key encipherment
