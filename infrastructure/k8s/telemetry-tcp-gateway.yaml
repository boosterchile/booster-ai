# Booster AI — telemetry-tcp-gateway (GKE Autopilot)
#
# Long-lived TCP server para devices Teltonika. Service type=LoadBalancer
# expone TCP externo (Cloud Run no soporta TCP persistente — por eso GKE).
#
# Workload Identity: el ServiceAccount K8s "telemetry-gateway-sa" se
# vincula al GCP SA "booster-cloudrun-sa" via annotation, dándole acceso
# a Postgres (via Secret Manager DATABASE_URL) y Pub/Sub publish.
#
# Apply via Cloud Build step:
#   gcloud container clusters get-credentials booster-ai-telemetry --region=southamerica-west1
#   kubectl apply -f infrastructure/k8s/telemetry-tcp-gateway.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: telemetry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-gateway-sa
  namespace: telemetry
  annotations:
    # Workload Identity: K8s SA → GCP SA (mismo SA que Cloud Run runtime
    # — ya tiene los roles necesarios: Pub/Sub publisher, Secret Manager
    # accessor, Cloud SQL client).
    iam.gke.io/gcp-service-account: booster-cloudrun-sa@booster-ai-494222.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-tcp-gateway
  namespace: telemetry
  labels:
    app: telemetry-tcp-gateway
spec:
  replicas: 2 # HA — al menos 2 para rolling updates sin caída
  selector:
    matchLabels:
      app: telemetry-tcp-gateway
  template:
    metadata:
      labels:
        app: telemetry-tcp-gateway
    spec:
      serviceAccountName: telemetry-gateway-sa
      # Trivy IaC hardening: pod-level security defaults.
      # UID/GID 10001 coincide con el booster user del Dockerfile (>= 10000
      # satisface AVD-KSV-0118; evita colisiones con UIDs reservados del SO).
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: gateway
          # Trivy IaC hardening: container-level locked-down defaults.
          # readOnlyRootFilesystem requiere emptyDir para /tmp (Node escribe
          # v8-compile-cache + npm-related artefactos en startup).
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # IMAGEN actualizada por Cloud Build con kubectl set image:
          #   kubectl set image deployment/telemetry-tcp-gateway \
          #     gateway=southamerica-west1-docker.pkg.dev/booster-ai-494222/containers/telemetry-tcp-gateway:$_COMMIT_SHA \
          #     -n telemetry
          image: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers/telemetry-tcp-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: teltonika-tcp
              containerPort: 5027
              protocol: TCP
            # Wave 3 D3: TLS endpoint dual. Devices migrados a Wave 3
            # se conectan a 5061 con cert pinned (Let's Encrypt vía
            # cert-manager).
            - name: teltonika-tls
              containerPort: 5061
              protocol: TCP
          env:
            - name: PORT
              value: "5027"
            - name: GOOGLE_CLOUD_PROJECT
              value: "booster-ai-494222"
            - name: PUBSUB_TOPIC_TELEMETRY
              value: "telemetry-events"
            # Wave 2 B3: topic donde el gateway publica el packet completo
            # cuando detecta un Crash event (eventIoId=247 priority=panic).
            # El processor consume y guarda el trace en GCS + BigQuery.
            - name: PUBSUB_TOPIC_CRASH_TRACES
              value: "crash-traces"
            - name: IDLE_TIMEOUT_SEC
              value: "300"
            - name: LOG_LEVEL
              value: "info"
            - name: NODE_ENV
              value: "production"
            # Wave 3 D3 — TLS endpoint en puerto 5061. Si los paths del
            # cert no se montan (TLS_CERT_PATH/TLS_KEY_PATH vacíos), el
            # gateway corre solo en plain (5027).
            - name: TLS_PORT
              value: "5061"
            - name: TLS_CERT_PATH
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_PATH
              value: "/etc/tls/tls.key"
            # DATABASE_URL viene de Secret Manager via External Secrets (futuro)
            # o por ahora se inyecta como Secret K8s manual (kubectl create secret).
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemetry-gateway-secrets
                  key: database-url
          volumeMounts:
            # cert-manager renueva el cert vía Let's Encrypt y lo deja
            # en el Secret K8s `telemetry-tls-cert`. Ese Secret se monta
            # como volumen read-only en /etc/tls/{tls.crt, tls.key, ca.crt}.
            - name: tls-cert
              mountPath: /etc/tls
              readOnly: true
            # /tmp writable para readOnlyRootFilesystem: true (Node v8-cache).
            - name: tmp
              mountPath: /tmp
          resources:
            # GKE Autopilot solo permite ratios CPU:RAM específicos.
            # 0.5 CPU + 1Gi RAM es válido y suficiente para piloto.
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          # Liveness/readiness probes via TCP socket: si el puerto no
          # responde, K8s reinicia el pod. No hay HTTP /health dedicado
          # (el gateway es TCP-only) pero si el server escucha, está vivo.
          readinessProbe:
            tcpSocket:
              port: teltonika-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: teltonika-tcp
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          # Graceful shutdown: SIGTERM → main.ts cierra server +
          # flush pubsub + close pool en ≤30s. preStop sleep para que
          # K8s saque el pod del Service antes de cortar conexiones
          # nuevas.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 60
      volumes:
        # cert-manager.io/v1 Certificate produce este Secret cuando ACME
        # challenge resuelve. Si no existe (ej. primer apply, antes de
        # validación DNS), el pod se queda en CreateContainerConfigError
        # hasta que aparezca — normal durante bootstrap.
        - name: tls-cert
          secret:
            secretName: telemetry-tls-cert
            optional: true
        # /tmp writable (readOnlyRootFilesystem requiere mount aparte).
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-tcp-gateway
  namespace: telemetry
  annotations:
    # Network LB regional TCP (no es HTTPS LB global; ese es para Cloud
    # Run/web). Más eficiente para conexiones long-lived TCP.
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  # IP estática reservada `booster-telemetry-lb-ip` (ver
  # infrastructure/compute.tf). Sin esto el LB usa IP ephemeral que
  # cambia en cada recreación del Service y el A record DNS
  # `telemetry.boosterchile.com` (que apunta a la IP estática) deja de
  # llegar al gateway. Causó outage productivo 2026-05-07 13:25–20:41 UTC
  # cuando el terraform apply de Wave 2/3 alineó el DNS a la IP estática
  # mientras el Service seguía con IP ephemeral.
  loadBalancerIP: "34.176.238.106"
  externalTrafficPolicy: Local # preserva client IP para logs
  selector:
    app: telemetry-tcp-gateway
  ports:
    - name: teltonika-tcp
      protocol: TCP
      port: 5027
      targetPort: teltonika-tcp
---
# Wave 3 D3: Service TLS dedicado (puerto 5061).
# Service separado para que el TLS endpoint pueda tener su propia IP/DNS
# (telemetry-tls.boosterchile.com) y para que devices Wave 1/2 puedan
# seguir conectándose al endpoint plain mientras Wave 3 migra.
#
# loadBalancerIP: la IP estática `booster-telemetry-tls-lb-ip` se
# provisiona en infrastructure/wave-3-tls.tf. Después de `terraform
# apply`, usar `terraform output telemetry_tls_lb_ip` y reemplazar el
# placeholder de abajo. Sin el loadBalancerIP, GKE asigna ephemeral y
# el DNS A record queda apuntando a IP estática vacía (mismo bug que
# causó el outage 2026-05-07 — ver MR !39).
apiVersion: v1
kind: Service
metadata:
  name: telemetry-tcp-gateway-tls
  namespace: telemetry
  annotations:
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  loadBalancerIP: "34.176.1.94"
  externalTrafficPolicy: Local
  selector:
    app: telemetry-tcp-gateway
  ports:
    - name: teltonika-tls
      protocol: TCP
      port: 5061
      targetPort: teltonika-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemetry-tcp-gateway
  namespace: telemetry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemetry-tcp-gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
