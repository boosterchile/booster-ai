# Wave 3 D4 — Manifest del telemetry-tcp-gateway en cluster DR (us-central1).
#
# Idéntico al primary (telemetry-tcp-gateway.yaml) excepto:
#   - Service spec.loadBalancerIP apuntando a la IP estática DR.
#   - Labels role=disaster-recovery para distinguir en métricas.
#   - terminationGracePeriodSeconds más largo (90s) — el DR puede tardar
#     más en drenar conexiones tras un failover de vuelta al primary.
#
# Apply:
#   gcloud container clusters get-credentials booster-ai-telemetry-dr \
#     --region=us-central1
#   kubectl apply -f infrastructure/k8s/telemetry-tcp-gateway-dr.yaml
#   kubectl apply -f infrastructure/k8s/cert-manager.yaml  # mismo cert-manager que primary
#
# El cert-manager Certificate `telemetry-tls-cert` debe incluir tanto
# `telemetry-tls.boosterchile.com` (primary) como
# `telemetry-dr.boosterchile.com` (backup) en su `dnsNames` para que
# el device acepte ambos endpoints con el mismo cert pinned.
---
apiVersion: v1
kind: Namespace
metadata:
  name: telemetry
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telemetry-gateway-sa
  namespace: telemetry
  annotations:
    iam.gke.io/gcp-service-account: booster-cloudrun-sa@booster-ai-494222.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-tcp-gateway
  namespace: telemetry
  labels:
    app: telemetry-tcp-gateway
    role: disaster-recovery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telemetry-tcp-gateway
  template:
    metadata:
      labels:
        app: telemetry-tcp-gateway
        role: disaster-recovery
    spec:
      serviceAccountName: telemetry-gateway-sa
      containers:
        - name: gateway
          # Imagen vive en Artifact Registry de southamerica-west1 — cross-region pull
          # desde us-central1. Hay latencia inicial al primer pull (~2-3s) pero el
          # caché del nodo lo evita en restarts subsiguientes. Crear repo separado en
          # us-central1 + replicar imagen es overhead injustificado por ahora.
          image: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers/telemetry-tcp-gateway:latest
          imagePullPolicy: Always
          ports:
            - name: teltonika-tcp
              containerPort: 5027
              protocol: TCP
            - name: teltonika-tls
              containerPort: 5061
              protocol: TCP
          env:
            - name: PORT
              value: "5027"
            - name: GOOGLE_CLOUD_PROJECT
              value: "booster-ai-494222"
            - name: PUBSUB_TOPIC_TELEMETRY
              value: "telemetry-events"
            - name: PUBSUB_TOPIC_CRASH_TRACES
              value: "crash-traces"
            - name: IDLE_TIMEOUT_SEC
              value: "300"
            - name: LOG_LEVEL
              value: "info"
            - name: NODE_ENV
              value: "production"
            - name: TLS_PORT
              value: "5061"
            - name: TLS_CERT_PATH
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_PATH
              value: "/etc/tls/tls.key"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: telemetry-gateway-secrets
                  key: database-url
            # DR-specific: marcar logs con role para filtrar en Cloud Logging.
            - name: GATEWAY_ROLE
              value: "disaster-recovery"
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: teltonika-tcp
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: teltonika-tcp
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      # 90s vs 60s del primary: tras failover de vuelta al primary, el
      # DR puede tener miles de devices reconectando — drenar con margen.
      terminationGracePeriodSeconds: 90
      volumes:
        - name: tls-cert
          secret:
            secretName: telemetry-tls-cert
            optional: true
---
# Service único en DR con dos puertos en la misma IP
# `136.116.208.86` (Terraform output `dr_lb_ip`).
#
# A diferencia del primary que separa plain/TLS en dos IPs (Wave 2 sigue
# necesitando 5027), en DR sólo se acepta TLS port 5061 — los devices
# que llegan al backup son Wave 3 (TLS-only). Plain 5027 NO se ofrece
# en DR. Si un device Wave 1/2 fallea al primary y no tiene backup
# configurado, el comportamiento es buffering local hasta que primary
# vuelva, lo cual es el flujo esperado de Wave 1/2.
#
# Sigue exponiendo containerPort 5027 en el deployment para que el
# health check (TCP probe a teltonika-tcp) siga funcionando — es solo
# un check de liveness interno al pod, no se expone al LB.
apiVersion: v1
kind: Service
metadata:
  name: telemetry-tcp-gateway-tls
  namespace: telemetry
  annotations:
    cloud.google.com/l4-rbs: "enabled"
spec:
  type: LoadBalancer
  loadBalancerIP: "136.116.208.86"
  externalTrafficPolicy: Local
  selector:
    app: telemetry-tcp-gateway
  ports:
    - name: teltonika-tls
      protocol: TCP
      port: 5061
      targetPort: teltonika-tls
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: telemetry-tcp-gateway
  namespace: telemetry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: telemetry-tcp-gateway
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
