# Cloud Build config one-off para imagen del job merge-duplicate-users.
#
# Reusa apps/api/Dockerfile sin cambios — el job comparte runtime con la api,
# se diferencia por el comando que se override-ea en el Cloud Run Job
# (`node dist/jobs/merge-duplicate-users.js` en vez de `node dist/main.js`).
#
# El TAG se pasa por substitution para no hardcodear fechas en el archivo.
# Uso:
#   gcloud builds submit \
#     --project=booster-ai-494222 \
#     --region=southamerica-west1 \
#     --config=cloudbuild.merge-job.yaml \
#     --substitutions=_TAG=merge-job-YYYY-MM-DD \
#     .

steps:
  - id: build-api-job
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file=apps/api/Dockerfile
      - --tag=${_REGISTRY}/api:${_TAG}
      - .
    waitFor: ['-']

  - id: push-api-job
    name: gcr.io/cloud-builders/docker
    args: [push, '${_REGISTRY}/api:${_TAG}']
    waitFor: [build-api-job]

substitutions:
  _REGISTRY: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers
  _TAG: merge-job-latest

images:
  - ${_REGISTRY}/api:${_TAG}

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

# Mismo SA que el build de prod — tiene permisos a Artifact Registry y storage.
serviceAccount: projects/booster-ai-494222/serviceAccounts/github-deployer@booster-ai-494222.iam.gserviceaccount.com

timeout: 1200s
