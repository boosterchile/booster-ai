# Cloud Build pipeline — staging
# Triggered desde GitHub Actions release.yml via WIF.
# Construye imágenes Docker de cada app y deploya a Cloud Run staging.
# Ver ADR-001 stack selection.

steps:
  # -------------------------------------------------------------------------
  # Build & push de cada imagen en paralelo
  # -------------------------------------------------------------------------
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGISTRY}/api:${_COMMIT_SHA}
      - -t
      - ${_REGISTRY}/api:staging-latest
      - -f
      - apps/api/Dockerfile
      - .
    waitFor: ['-']

  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGISTRY}/web:${_COMMIT_SHA}
      - -t
      - ${_REGISTRY}/web:staging-latest
      - -f
      - apps/web/Dockerfile
      - .
    waitFor: ['-']

  # Push imágenes
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, '${_REGISTRY}/api']
    waitFor: [build-api]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, '${_REGISTRY}/web']
    waitFor: [build-web]

  # -------------------------------------------------------------------------
  # Deploy a Cloud Run staging
  # -------------------------------------------------------------------------
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - booster-ai-api-staging
      - --image=${_REGISTRY}/api:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=booster-cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --set-env-vars=NODE_ENV=staging,SERVICE_NAME=booster-ai-api,SERVICE_VERSION=${_COMMIT_SHA}
      - --set-secrets=DATABASE_URL=booster-database-url:latest
      - --labels=env=staging,commit=${_COMMIT_SHA}
    waitFor: [push-api]

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - booster-ai-web-staging
      - --image=${_REGISTRY}/web:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --service-account=booster-cloudrun-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --labels=env=staging,commit=${_COMMIT_SHA}
    waitFor: [push-web]

  # -------------------------------------------------------------------------
  # Smoke tests post-deploy
  # -------------------------------------------------------------------------
  - id: smoke-test
    name: gcr.io/cloud-builders/curl
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        for url in "$(gcloud run services describe booster-ai-api-staging --region=${_REGION} --format='value(status.url)')/health"; do
          echo "Testing $url"
          for i in 1 2 3 4 5; do
            if curl -fsS "$url"; then
              echo "✓ OK"
              break
            fi
            sleep 10
          done
        done
    waitFor: [deploy-api, deploy-web]

substitutions:
  _REGION: southamerica-west1
  _REGISTRY: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers
  _ENV: staging
  _COMMIT_SHA: manual

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 1800s
