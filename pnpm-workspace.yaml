packages:
  - "apps/*"
  - "packages/*"
  - "scripts/demo"
  - "scripts/load-test"
  - "scripts/repo-checks"

# FUENTE ÚNICA de overrides + onlyBuiltDependencies (ADR-075): pnpm 10 lee
# ESTE archivo. package.json ya NO tiene el campo `pnpm` (se eliminó en la
# migración a pnpm 10); `packageManager` fija pnpm@10.34.4 vía Corepack.
# Los 13 overrides son security pins (CVEs) — no quitar ninguno sin re-verificar
# `pnpm audit --audit-level=high --prod`. Antecedente: 2026-06-11 un lockfile
# sin `settings.overrides` resolvió crypto-js 3.3.0 y @grpc/grpc-js vulnerables;
# estos pins lo previenen. Un `pnpm install` con pnpm 9 ignoraría este archivo
# y dropearía los overrides → usar Corepack/pnpm 10 (ADR-075).
overrides:
  "crypto-js@<4.2.0": ">=4.2.0"
  "fast-xml-builder@<1.1.7": ">=1.1.7"
  "http-proxy-agent@<7.0.0": ">=7.0.0"
  "uuid@<11.1.1": ">=11.1.1"
  "@grpc/grpc-js@<1.14.4": ">=1.14.4"
  "tmp@<0.2.6": ">=0.2.6"
  "form-data@<2.5.6": ">=2.5.6"
  "protobufjs@<7.6.3": ">=7.6.3 <8"
  "qs@>=6.11.1 <6.15.2": ">=6.15.2"
  "@opentelemetry/core@<2.8.0": ">=2.8.0"
  "@opentelemetry/resources@<2.8.0": ">=2.8.0"
  "@opentelemetry/sdk-trace-base@<2.8.0": ">=2.8.0"
  "websocket-driver@<0.7.5": ">=0.7.5"

onlyBuiltDependencies:
  - "@biomejs/biome"
  - esbuild
