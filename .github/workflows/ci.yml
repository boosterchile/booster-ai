name: CI

# Ejecutado en cada push a cualquier branch y en cada PR hacia main.
# Gates bloqueantes: lint (Biome), typecheck (tsc), tests (Vitest) con coverage ≥80%, build.
# Ver docs/adr/001-stack-selection.md y CLAUDE.md principio 1 (zero tech debt).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.4'
  # Coverage gate: cada workspace declara sus thresholds en
  # vitest.config.ts (coverage.thresholds). Vitest falla el run cuando no
  # se cumplen — ése es el gate. CLAUDE.md objetivo final: 80%/75%/80%/80%
  # en todos los apps; subida es PR-by-PR.

jobs:
  # ---------------------------------------------------------------------------
  # Setup — instala deps una vez, reusa en jobs subsiguientes via cache
  # ---------------------------------------------------------------------------
  setup:
    name: Install dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile

  # ---------------------------------------------------------------------------
  # Lint — Biome (strict, bloqueante)
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Biome)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - name: Format check
        run: pnpm format:check

  # ---------------------------------------------------------------------------
  # Typecheck — tsc --noEmit por workspace (Turborepo paraleliza)
  # ---------------------------------------------------------------------------
  typecheck:
    name: Typecheck (tsc)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # ---------------------------------------------------------------------------
  # Test + Coverage Gate (≥80% bloqueante)
  # ---------------------------------------------------------------------------
  test:
    name: Test + Coverage (per-workspace gate)
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage (gate per-workspace via vitest.config.ts)
        # Cada workspace declara su threshold en vitest.config.ts (sección
        # `coverage.thresholds`). Vitest mismo falla el run si no se cumplen
        # — ese es el gate. Una segunda pasada bash redundante eliminó la
        # capacidad de tener thresholds incrementales por workspace
        # (CLAUDE.md objetivo final: 80%/75%/80%/80% en TODOS los apps;
        # los workspaces actuales con baseline más bajo lo declaran y la
        # subida es PR-by-PR).
        run: pnpm test:coverage
      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: '**/coverage/**'
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build — cada app y package compila a producción
  # ---------------------------------------------------------------------------
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            apps/*/dist/**
            packages/*/dist/**
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Final gate — todos los jobs previos deben pasar
  # ---------------------------------------------------------------------------
  ci-success:
    name: CI Success
    needs: [lint, typecheck, test, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs succeeded
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "✓ All CI jobs passed"
