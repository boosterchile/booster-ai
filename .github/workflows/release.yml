name: Release + Deploy

# Gestión de versiones con Changesets + deploy a GCP via Workload Identity Federation.
# Triggered on push to main después de CI verde.
# Sin service account keys descargadas — cumple ADR de seguridad.

on:
  push:
    branches: [main]
    # Pushes docs-only NO disparan deploy (era no-op + ensuciaba la lane de
    # concurrency). Denylist: lo NO listado siempre despliega (falla seguro).
    # NO agregar '**/*.md' acá: matchearía .changeset/*.md y rompería el
    # release de versiones. '*.md' (un solo '*') es root-only. Ver
    # .specs/ci-release-skip-docs-only/spec.md (R1/SC-3).
    # 'scripts/**': tooling/dev no-desplegable. Verificado 2026-06-24: ningún
    # script bajo scripts/ es ejecutado por el deploy (ni release.yml ni
    # cloudbuild.production.yaml — deploy-telemetry-gateway.sh es manual/
    # break-glass, ADR-065). ci.yml/security.yml igual los validan (corren sin
    # paths-ignore). Footgun visto en #545.
    paths-ignore:
      - 'docs/**'
      - '.specs/**'
      - 'references/**'
      - 'playbooks/**'
      - 'scripts/**'
      - '*.md'
  # Trigger manual: re-disparar el deploy de `main` sin depender de un push.
  # Agregado tras el footgun 2026-06-22 (merges rápidos a main trabaron la
  # lane de concurrency `cancel-in-progress:false` y la única vía de
  # re-trigger era pushear). Uso: `gh workflow run release.yml --ref main`
  # o Actions → Release + Deploy → Run workflow.
  workflow_dispatch: {}

concurrency:
  # Grupo renombrado 2026-06-22 (era `release-${{ github.workflow }}-main`)
  # para RESETEAR un lock de concurrency que quedó trabado tras la cascada de
  # merges rápidos: TODO release run colgaba en `pending, 0 jobs` sin despachar
  # (push y workflow_dispatch por igual). Un namespace de lock nuevo arranca
  # limpio. Ver memoria ci-release-paths-ignore-2026-06.
  group: release-deploy-${{ github.ref_name }}
  cancel-in-progress: false  # No cancelar deploys en progreso

permissions:
  contents: write         # Crear PR de release y tags
  pull-requests: write    # Crear PR de release
  id-token: write         # OIDC para Workload Identity Federation con GCP

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '9.15.4'
  GCP_PROJECT_ID: booster-ai-494222
  GCP_REGION: southamerica-west1

jobs:
  # ---------------------------------------------------------------------------
  # Changesets — bumps versiones + genera PR "Version Packages" o publica
  # ---------------------------------------------------------------------------
  version-or-publish:
    name: Version or publish (Changesets)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
          version: pnpm changeset version
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Deploy production — manual approval requerida
  # ---------------------------------------------------------------------------
  # NOTA: el job deploy-staging se removió temporalmente. La infra Terraform
  # sólo crea el entorno `prod` en GCP project booster-ai-494222. Un staging
  # real requiere un segundo GCP project con infra paralela (backlog
  # #STAGING-ENV). Hasta entonces el flujo es: CI verde → approval → prod.
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to production
    needs: version-or-publish
    runs-on: ubuntu-latest
    # 75 y no 30 (fix 2026-06-12): el canary duerme 30 min DENTRO de Cloud
    # Build mientras este job streamea `gcloud builds submit` — con 30 el
    # job moría SIEMPRE cancelado a mitad del canary (el build seguía y
    # completaba server-side, pero el run quedaba 'cancelled' y el smoke
    # final nunca corría). Presupuesto: gate CI ~10 + build/push ~15 +
    # canary 30 + verify/promoción ~10 + smoke.
    timeout-minutes: 75
    environment:
      name: production  # Requires manual approval via GitHub Environments
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      # Gate real de CI (auditoría 2026-06-09, riesgo medio): release.yml y
      # ci.yml se disparan EN PARALELO en push a main — el comentario
      # "después de CI verde" no se cumplía mecánicamente. Este step espera
      # el check "CI Success" del MISMO sha; falla el deploy si CI falla.
      - name: Esperar CI Success del mismo SHA
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 40); do
            conclusion=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?check_name=CI%20Success"               --jq '.check_runs[0].conclusion // "pending"')
            status=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/check-runs?check_name=CI%20Success"               --jq '.check_runs[0].status // "queued"')
            echo "poll $i/40: status=$status conclusion=$conclusion"
            if [ "$conclusion" = "success" ]; then exit 0; fi
            if [ "$conclusion" != "pending" ] && [ "$conclusion" != "null" ] && [ "$status" = "completed" ]; then
              echo "::error::CI Success terminó en '$conclusion' — deploy abortado"; exit 1
            fi
            sleep 45
          done
          echo "::error::timeout esperando CI Success (30 min)"; exit 1
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT_DEPLOY }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
      - name: Trigger Cloud Build (production)
        # _COMMIT_SHA es la única substitution que pasamos — _REGION/_REGISTRY
        # tienen defaults en cloudbuild.production.yaml, y _ENV no se usa.
        # gcloud builds submit rechaza substitutions no declaradas (era el bug
        # `_ENV no matched in template`).
        # T13-fix (2026-05-28) NOTE: canary traffic tag short SHA derives
        # inline from `${_COMMIT_SHA}` inside the cloudbuild canary steps
        # (bash ${VAR:0:12} slice). No separate substitution needed.
        run: |
          gcloud builds submit --config=cloudbuild.production.yaml \
            --region=${{ env.GCP_REGION }} \
            --substitutions=_COMMIT_SHA=${{ github.sha }}

      # Post-deploy: smoke tests + notificación
      - name: Smoke test — API health
        run: |
          for i in 1 2 3; do
            if curl -fsS "${{ vars.PRODUCTION_URL }}/health"; then
              echo "✓ API healthy"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 30s..."
            sleep 30
          done
          echo "::error::API health check failed after 3 attempts"
          exit 1
