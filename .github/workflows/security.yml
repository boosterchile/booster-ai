name: Security

# Escaneos de seguridad: secretos (gitleaks), vulnerabilidades de dependencias (npm audit),
# análisis estático (CodeQL). Ver references/security-checklist.md.
# Gates bloqueantes para evitar regresiones como SEC-2026-04-01 (Booster 2.0).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scheduled scan — Lunes 03:00 UTC (00:00 Chile)
    - cron: '0 3 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write  # Para subir SARIF a Security tab
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Gitleaks — escaneo de secretos en código + historial completo
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historial completo para scan profundo
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Config custom opcional en .gitleaks.toml

  # ---------------------------------------------------------------------------
  # npm audit — vulnerabilidades de dependencias
  # ---------------------------------------------------------------------------
  npm-audit:
    name: npm audit (HIGH+)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit (HIGH+)
        run: |
          # Falla si hay vulnerabilidades HIGH o CRITICAL
          pnpm audit --audit-level=high --prod || {
            echo "::error::High/Critical vulnerabilities detected. Run 'pnpm audit' locally for details."
            echo "::notice::If unfixable, document en PR + issue con tracking."
            exit 1
          }

  # ---------------------------------------------------------------------------
  # CodeQL — análisis estático de JS/TS
  # ---------------------------------------------------------------------------
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:${{ matrix.language }}'

  # ---------------------------------------------------------------------------
  # Trivy — escaneo de Dockerfiles (filesystem + config misconfigurations)
  # ---------------------------------------------------------------------------
  trivy:
    name: Trivy filesystem + config scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true
      - name: Trivy config scan (Dockerfiles + Terraform)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL
          exit-code: '0'  # No bloquea, reporta
      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  # ---------------------------------------------------------------------------
  # T7.5 SEC-001 — gate fail-closed: el secret demo-seed-password debe tener
  # al menos 1 version antes de mergear cambios a apps/api/src/services/seed-demo*.ts.
  # Previene P0-5 del round 1 devils-advocate: que T8 mergee con secret vacío
  # y crashee cold-starts del api.
  #
  # Auth WIF mismo patrón que release.yml:77 (google-github-actions/auth@v2).
  # SA: github-deployer (vars.WIF_SERVICE_ACCOUNT_DEPLOY) con
  # roles/secretmanager.viewer sobre demo-seed-password — grant en
  # infrastructure/security-hotfixes-2026-05-14.tf (T7.5.1).
  # ---------------------------------------------------------------------------
  check-secret-version-exists:
    name: Demo seed password — version exists
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # paths filter via if + paths-filter action; aquí usamos paths via files
    # context. El job solo es relevante en PRs que tocan seed-demo*.ts (P0-5).
    # En push a main corre incondicionalmente para detectar regresiones.
    permissions:
      contents: read
      id-token: write  # Para WIF
    steps:
      - uses: actions/checkout@v4
      - name: Detect seed-demo changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            seed:
              - 'apps/api/src/services/seed-demo*.ts'
              - 'infrastructure/scripts/check-secret-version-exists.sh'
              - 'infrastructure/scripts/init-demo-seed-password.sh'
              - 'infrastructure/security-hotfixes-2026-05-14.tf'
              - '.github/workflows/security.yml'
      - name: Authenticate to Google Cloud
        if: steps.changes.outputs.seed == 'true' || github.event_name == 'push'
        uses: google-github-actions/auth@v2
        with:
          project_id: booster-ai-494222
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT_DEPLOY }}
      - name: Set up gcloud
        if: steps.changes.outputs.seed == 'true' || github.event_name == 'push'
        uses: google-github-actions/setup-gcloud@v3
      - name: Check demo-seed-password has >= 1 version
        if: steps.changes.outputs.seed == 'true' || github.event_name == 'push'
        run: |
          bash infrastructure/scripts/check-secret-version-exists.sh demo-seed-password
      - name: Skipped (no seed-demo changes)
        if: steps.changes.outputs.seed != 'true' && github.event_name != 'push'
        run: echo "Skip — PR no toca seed-demo*.ts ni el plumbing del gate."

  # ---------------------------------------------------------------------------
  # T2b SEC-001 Sprint 2b — Comment-lint del allowlist is-demo
  # Spec sec-001-cierre §3 SC-1.3.6 part 2 + plan-sprint-2b §3 T2b.
  # Valida que cada entry en `is-demo-allowlist.ts` tiene rationale
  # non-empty + reviewBy ISO YYYY-MM-DD strictly in future. Drift
  # detection: corre en cada push/PR; expiraciones se detectan day-0.
  # ---------------------------------------------------------------------------
  is-demo-allowlist-comments:
    name: is-demo allowlist comment-lint (SC-1.3.6 T6c)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate allowlist entries (rationale + reviewBy future)
        run: pnpm --filter @booster-ai/api exec tsx scripts/check-is-demo-allowlist-comments.ts

  # ---------------------------------------------------------------------------
  # T3 SEC-001 Sprint 2b — wire-completeness CI gate is-demo enforcement
  # Spec sec-001-cierre §3 SC-1.3.2 v3.4 amendment A1 + plan-sprint-2b
  # §3 T3 (NEW per devils-advocate round 2 P0-2). Parsea server.ts +
  # verifica que cada mount point con firebaseAuthMiddleware también
  # tiene isDemoEnforcementMiddleware en el chain. Previene incomplete
  # coverage shipping en future PRs.
  # ---------------------------------------------------------------------------
  is-demo-wire-completeness:
    name: is-demo wire-completeness gate (SC-1.3.2 T3)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify all auth-required mount points have isDemoEnforcementMiddleware wired
        run: pnpm --filter @booster-ai/api exec tsx scripts/check-is-demo-wire-completeness.ts

  # ---------------------------------------------------------------------------
  # SEC-001 boundary-closure T2 (SC-G1b) — harness CI default-deny.
  # Spec .specs/sec-001-h1-2-google-boundary-closure/spec.md SC-G1b + T15;
  # ADR-057 (supersede ADR-054). Enumera CADA mount de server.ts (app.route()
  # + sub-mounts <router>.route(), que check-is-demo-wire-completeness NO ve)
  # y falla el build si aparece un factory/router sin clasificar en
  # ROUTE_CLASSIFICATION. Reemplaza el backstop creation-time (blocking
  # function) por una invariante de wiring durable.
  # ---------------------------------------------------------------------------
  route-default-deny:
    name: route default-deny harness (SC-G1b T15)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify every server.ts route mount is classified (default-deny)
        run: pnpm --filter @booster-ai/api exec tsx scripts/check-route-default-deny.ts

  # ---------------------------------------------------------------------------
  # T2b SEC-001 Sprint 2b — PR-modifies guard del allowlist is-demo
  # Spec sec-001-cierre §3 SC-1.3.6 part 3 + plan-sprint-2b §3 T2b.
  # Si el PR-diff modifica `is-demo-allowlist.ts`, re-corre el validator
  # T6c. Defense-in-depth + visibility en PR check name. Sin `[skip ci]`
  # (branch protection guard via required status check).
  # ---------------------------------------------------------------------------
  is-demo-allowlist-pr-guard:
    name: is-demo allowlist PR-modifies guard (SC-1.3.6 T6d)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history para git diff vs base
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: PR-modifies guard (validates entries if file in diff)
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
        run: pnpm --filter @booster-ai/api exec tsx scripts/check-allowlist-pr-guard.ts

  # ---------------------------------------------------------------------------
  # SBOM generation — Software Bill of Materials para auditoría
  # ---------------------------------------------------------------------------
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Generate CycloneDX SBOM
        # cdxgen es pnpm-workspace aware (cyclonedx-npm rompía con workspace:* protocol)
        run: npx -y @cyclonedx/cdxgen@latest --type pnpm --output sbom.cyclonedx.json --spec-version 1.5
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 90
