name: E2E Staging

# Tests E2E Playwright contra el ambiente staging.
# Corre nightly + on-demand. No bloquea merge (staging es ambiente real con data real).
# Ver references/code-review-checklist.md para criterios de E2E.

on:
  schedule:
    # Cada día a las 04:00 UTC (01:00 Chile)
    - cron: '0 4 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright:
    name: Playwright + axe-core (a11y)
    # Guard (auditoría 2026-06-09): en PRs, si STAGING_URL no está seteada
    # (staging no existe — #STAGING-ENV), el job se SALTA en vez de caer al
    # fallback PRODUCTION_URL y pegarle a prod con data real desde un PR.
    # El nightly (schedule) sigue corriendo contra producción a propósito.
    if: github.event_name != 'pull_request' || vars.STAGING_URL != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Browsers preinstalados en la imagen oficial de Playwright, pin EXACTO a
    # la versión de @playwright/test del lockfile (1.59.1). Elimina el step
    # `playwright install`, cuya descarga de webkit colgaba 30 min y cancelaba
    # el job (5+ noches seguidas). La imagen `noble` trae Node 22 (cumple
    # engines >= 22). Al subir @playwright/test, actualizar este tag a la par.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - run: pnpm install --frozen-lockfile
      - name: Run E2E
        env:
          BASE_URL: ${{ github.event_name == 'pull_request' && vars.STAGING_URL || vars.PRODUCTION_URL }}
        run: pnpm --filter @booster-ai/web test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
      - name: Upload a11y violations (if any)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: a11y-violations
          path: apps/web/test-results/a11y-*.json
          retention-days: 14
          if-no-files-found: ignore
