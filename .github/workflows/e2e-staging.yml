name: E2E Staging

# Tests E2E Playwright contra el ambiente staging.
# Corre nightly + on-demand. No bloquea merge (staging es ambiente real con data real).
# Ver references/code-review-checklist.md para criterios de E2E.

on:
  schedule:
    # Cada día a las 04:00 UTC (01:00 Chile)
    - cron: '0 4 * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/api/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  playwright:
    name: Playwright + axe-core (a11y)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
        with:
          version: '9.15.4'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        run: pnpm --filter @booster-ai/web exec playwright install --with-deps chromium webkit
      - name: Run E2E
        env:
          BASE_URL: ${{ github.event_name == 'pull_request' && vars.STAGING_URL || vars.PRODUCTION_URL }}
        run: pnpm --filter @booster-ai/web test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14
      - name: Upload a11y violations (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-violations
          path: apps/web/test-results/a11y-*.json
          retention-days: 14
          if-no-files-found: ignore
