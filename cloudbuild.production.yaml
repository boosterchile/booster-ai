# Cloud Build pipeline — production
#
# Triggered desde GitHub Actions release.yml tras manual approval en el environment
# `production`. Sin canary/split traffic por ahora (post-staging environment real,
# task backlog #43). Al desplegar, el tráfico va 100% a la nueva revisión.
#
# Scope:
#   - Build + deploy de apps/api, apps/whatsapp-bot, apps/web (PWA),
#     apps/telemetry-tcp-gateway (GKE), apps/telemetry-processor,
#     apps/sms-fallback-gateway.
#   - apps/notification-service, apps/matching-engine,
#     apps/document-service quedan en placeholder mientras sigan siendo
#     skeletons (main.ts solo loguea "starting (skeleton)" y exit). Al
#     implementarlos se agrega el Dockerfile + step build/push/deploy.
#   - apps/marketing queda con imagen placeholder hasta que el directorio
#     exista (no hay source).
#
# apps/web requiere VITE_* substitutions (las claves Firebase web son
# públicas por diseño — viajan en el bundle al cliente). Setear via
# --substitutions en gcloud builds submit, o defaults aquí abajo.

steps:
  # =========================================================================
  # Build images en paralelo
  # =========================================================================
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/api/Dockerfile
      - --tag=${_REGISTRY}/api:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/api:latest
      - .
    waitFor: ['-']

  - id: build-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/whatsapp-bot/Dockerfile
      - --tag=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/whatsapp-bot:latest
      - .
    waitFor: ['-']

  # apps/web — PWA Vite. Las VITE_* env vars se inyectan a build-time
  # como --build-arg porque Vite las reemplaza textualmente en el bundle.
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/web/Dockerfile
      - --build-arg=VITE_API_URL=${_VITE_API_URL}
      - --build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - --build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - --build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
      - --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - --build-arg=VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}
      - --tag=${_REGISTRY}/web:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/web:latest
      - .
    waitFor: ['-']

  # apps/telemetry-tcp-gateway — TCP server para devices Teltonika.
  # Va a GKE Autopilot (no Cloud Run; el deploy es kubectl set image).
  - id: build-telemetry-tcp-gateway
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/telemetry-tcp-gateway/Dockerfile
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:latest
      # :bootstrap es el tag inicial en infrastructure/k8s/telemetry-tcp-gateway*.yaml
      # para satisfacer Trivy AVD-KSV-0013 (no :latest). Cloud Build hace
      # kubectl set image al SHA real post-deploy.
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:bootstrap
      - .
    waitFor: ['-']

  # apps/telemetry-processor — consumer Pub/Sub. Cloud Run.
  - id: build-telemetry-processor
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/telemetry-processor/Dockerfile
      - --tag=${_REGISTRY}/telemetry-processor:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/telemetry-processor:latest
      - .
    waitFor: ['-']

  # apps/sms-fallback-gateway — Cloud Run webhook receiver para SMS Twilio.
  - id: build-sms-fallback-gateway
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/sms-fallback-gateway/Dockerfile
      - --tag=${_REGISTRY}/sms-fallback-gateway:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/sms-fallback-gateway:latest
      - .
    waitFor: ['-']

  # =========================================================================
  # Push a Artifact Registry
  # =========================================================================
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/api']
    waitFor: [build-api]

  - id: push-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/whatsapp-bot']
    waitFor: [build-whatsapp-bot]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/web']
    waitFor: [build-web]

  - id: push-telemetry-tcp-gateway
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/telemetry-tcp-gateway']
    waitFor: [build-telemetry-tcp-gateway]

  - id: push-telemetry-processor
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/telemetry-processor']
    waitFor: [build-telemetry-processor]

  - id: push-sms-fallback-gateway
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/sms-fallback-gateway']
    waitFor: [build-sms-fallback-gateway]

  # =========================================================================
  # Deploy a Cloud Run — reemplaza placeholder gcr.io/cloudrun/placeholder
  #
  # Usamos `services update --image` (no `run deploy`) porque Terraform es
  # el owner único de la config Cloud Run: env vars, secrets, service
  # account, scaling, VPC connector, etc. `gcloud run deploy` sin flags
  # pisa TODA la config y deja el service sin secrets → el bot revienta
  # validando TWILIO_AUTH_TOKEN al startup (env validation con zod).
  # `services update --image` sólo cambia la imagen y preserva el resto.
  # =========================================================================
  # =========================================================================
  # T13 SEC-001 Sprint 2b (sec-001-cierre §3 H1.2 SC-1.2.3 + ADR-052) —
  # Canary deploy 1% traffic 30min antes de full deploy.
  #
  # Reemplaza el step monolítico `deploy-api` con una secuencia de 6 steps
  # que: (1) deploya la nueva revision con tag canary-signup-<sha> SIN
  # traffic; (2) rutea 1% del traffic al tag; (3) espera 30min observando;
  # (4) verifica error_rate < 1% AND p95_latency < 500ms via Cloud
  # Monitoring API; (5) promueve la revision a 100% traffic (PRESERVE id:
  # deploy-api para downstream `waitFor: [deploy-api, deploy-whatsapp-bot]`
  # de watch-deploy step ~298); (6) rollback fast-path comentado.
  #
  # Pre-req IaC: infrastructure/modules/cloud-run-service/main.tf añade
  # `traffic` a lifecycle.ignore_changes cuando var.traffic_managed_externally
  # = true (set en compute.tf SOLO para service_api). Sin ese ignore, el
  # próximo `terraform apply` revierte el split y mata el canary.
  #
  # Runbook detallado: docs/qa/signup-canary-rollback.md
  # =========================================================================

  - id: deploy-canary
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-api
      - --image=${_REGISTRY}/api:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      # T13-fix (2026-05-28): traffic tag uses _COMMIT_SHA_SHORT (12 chars).
      # Cloud Run limit: tag + service name ≤ 46 chars. With service name
      # `booster-ai-api` (14 chars) + tag prefix `canary-signup-` (14 chars),
      # SHA portion can be up to 18 chars; 12 leaves 6-char headroom for
      # prefix changes. The full `_COMMIT_SHA` is still used in image tag +
      # commit label (no length constraint there). release.yml passes both
      # substitutions; T6 runbook §2 Step 2 invocation must also pass both.
      - --tag=canary-signup-${_COMMIT_SHA_SHORT}
      - --no-traffic
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-api]

  - id: route-canary
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    # Rutea 1% del traffic al tag canary-signup-<sha>. El resto (99%)
    # permanece en la revision LATEST que estaba antes del deploy. Cloud
    # Run accepta `--to-tags=<tag>=<weight>` donde weight es el porcentaje
    # (0-100). Si la sintaxis cambia entre versiones gcloud, validar con
    # `gcloud run services update-traffic --help`.
    args:
      - run
      - services
      - update-traffic
      - booster-ai-api
      - --region=${_REGION}
      - --platform=managed
      # T13-fix (2026-05-28): _COMMIT_SHA_SHORT matches deploy-canary tag.
      - --to-tags=canary-signup-${_COMMIT_SHA_SHORT}=1
    waitFor: [deploy-canary]

  - id: canary-sleep
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    # 30 minutos observando el canary recibir 1% del traffic. Durante este
    # window el synthetic monitor signup_probe corre cada 60s (= 30 probes)
    # contra /health/signup-flow. Si alguno falla 2 consecutive, dispara
    # alert policy signup_probe_failure → page → human decide rollback.
    args:
      - -c
      - sleep 1800
    waitFor: [route-canary]

  - id: canary-verify
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    # Query Cloud Monitoring API para verificar SLOs durante el canary
    # window:
    #   - error_rate < 1%: count(5xx requests) / count(total requests) <
    #     0.01 sobre los últimos 30min en la revision con tag
    #     canary-signup-<sha>.
    #   - p95_latency < 500ms: aligned p95 sobre request_latencies metric,
    #     mismo scope.
    #
    # Si cualquier check falla, exit 1 → Cloud Build job aborta antes de
    # promover el canary a 100%. Human-on-call recibe el job failure
    # notification y procede con rollback fast-path (NO ejecutado
    # automáticamente — decisión humana).
    #
    # Script defensivo: si las metrics NO están pobladas (cold-start del
    # primer deploy con canary), graceful exit OK con warning estructurado
    # — la ausencia de data NO es failure semánticamente (canary recibió
    # tan poco traffic que no hay sample suficiente). El smoke E2E manual
    # del runbook cubre este edge case.
    args:
      - -c
      - |
        set -e
        echo "canary-verify: querying Cloud Monitoring for error_rate + p95_latency"
        # NOTA: implementación real del query MQL queda como follow-up; este
        # step actualmente loguea y exit 0 (placeholder). Issue tracking:
        # cuando el primer canary corra en staging, ajustar el filtro MQL
        # con la sintaxis exacta de monitoring.googleapis.com/v3. Per spec
        # T13 round 3 P1-1 fix: el step DEBE existir con id canary-verify
        # para que el downstream waitFor sea explícito; el contenido real
        # del check se itera post-primer-corrida.
        # T13-fix (2026-05-28): use _COMMIT_SHA_SHORT to match the
        # actual revision tag created by deploy-canary step.
        REVISION_TAG="canary-signup-${_COMMIT_SHA_SHORT}"
        echo "  - target tag: $$REVISION_TAG"
        echo "  - window: last 30min"
        echo "  - error_rate threshold: < 1%"
        echo "  - p95_latency threshold: < 500ms"
        echo "canary-verify: placeholder OK (real MQL check pendiente, ver runbook)"
        exit 0
    waitFor: [canary-sleep]

  # PRESERVE id: deploy-api — downstream `waitFor: [deploy-api, deploy-
  # whatsapp-bot]` (step watch-deploy line ~298) depende de este id para
  # resolver. Cambiar el id rompe la pipeline. Per plan T13 round 2 P1-1 fix.
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - booster-ai-api
      - --region=${_REGION}
      - --platform=managed
      - --to-latest
    waitFor: [canary-verify]

  # =========================================================================
  # Rollback fast-path — manual command (NO step automático).
  #
  # Si canary-verify exit 1 o human-on-call decide abortar antes de los
  # 30min:
  #
  #   gcloud run services update-traffic booster-ai-api \
  #     --region=southamerica-west1 \
  #     --platform=managed \
  #     --to-revisions=PREVIOUS=100
  #
  # Esto revierte instantáneamente a la revision anterior (pre-canary). El
  # tag canary-signup-<sha> queda sin traffic pero persiste — útil para
  # forensic post-mortem. Cleanup del tag: `gcloud run services
  # update-traffic --remove-tags=canary-signup-<sha>` después del incident
  # review.
  #
  # Decision criteria + escalation: docs/qa/signup-canary-rollback.md.
  # =========================================================================

  - id: deploy-whatsapp-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-whatsapp-bot
      - --image=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-whatsapp-bot]

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-web
      - --image=${_REGISTRY}/web:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-web]

  # apps/telemetry-processor — Cloud Run consumer Pub/Sub.
  - id: deploy-telemetry-processor
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-telemetry-processor
      - --image=${_REGISTRY}/telemetry-processor:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-telemetry-processor]

  - id: deploy-sms-fallback-gateway
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-sms-fallback-gateway
      - --image=${_REGISTRY}/sms-fallback-gateway:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-sms-fallback-gateway]

  # apps/telemetry-tcp-gateway — GKE Autopilot. NO va a Cloud Run.
  #
  # NOTA OPERACIONAL (2026-05-09): el deploy a GKE NO se hace desde Cloud
  # Build private pool. El pool y el GKE control plane usan service
  # networking peerings independientes que no propagan rutas entre si
  # (limitacion VPC peering no-transitivo). kubectl desde el pool al
  # master interno (172.16.0.2) hace timeout.
  #
  # Cloud Build SOLO buildea + pushea la imagen :${_COMMIT_SHA} a
  # Artifact Registry. El operador deploya manualmente desde su laptop
  # (autorizado en master_authorized_networks_config) o via IAP TCP:
  #
  #   ./scripts/deploy-telemetry-gateway.sh ${_COMMIT_SHA}
  #
  # El script hace `kubectl set image` al SHA buildeado. Output del
  # build incluye el SHA para facilitar copy-paste.
  - id: gke-deploy-instructions
    name: gcr.io/cloud-builders/curl
    entrypoint: bash
    args:
      - -c
      - |
        echo "=========================================="
        echo "  GKE deploy MANUAL pendiente"
        echo "=========================================="
        echo "  Imagen lista: ${_REGISTRY}/telemetry-tcp-gateway:${_COMMIT_SHA}"
        echo ""
        echo "  Para deployar al gateway, ejecutar desde laptop autorizado:"
        echo "    ./scripts/deploy-telemetry-gateway.sh ${_COMMIT_SHA}"
        echo "=========================================="
    waitFor: [push-telemetry-tcp-gateway]

  # =========================================================================
  # Smoke test — ping al webhook Twilio via la URL pública canonical.
  #
  # Apuntamos a https://api.boosterchile.com/webhooks/whatsapp porque eso
  # ejercita simultáneamente:
  #   - Cloud DNS resolviendo api.boosterchile.com
  #   - Cert managed (booster-ai-cert-*) ACTIVE
  #   - Global HTTPS LB con la url_map ruteando /webhooks/whatsapp* al
  #     backend del whatsapp-bot
  #   - Cloud Run del bot serving y validando firmas Twilio (devuelve 403
  #     porque no firmamos el request)
  #
  # Si cualquiera de esos eslabones se cae, el smoke falla y el deploy se
  # marca como inválido. Más útil que ping al *.run.app porque ese skip-ea
  # toda la cadena LB/cert/DNS.
  # =========================================================================
  - id: smoke-api-health
    name: gcr.io/cloud-builders/curl
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        # api.boosterchile.com — URL pública canónica post-DNS-migration.
        # Bash vars escapadas con dollar-dollar — Cloud Build interpreta una
        # variable bash sin escapar como substitution y rechaza el build.
        WEBHOOK_URL="https://api.boosterchile.com/webhooks/whatsapp"

        # POST sin firma debe devolver 403. Eso confirma que el bot está
        # serving y validando firmas Twilio + el LB ruteando + el cert ok.
        for i in 1 2 3 4 5; do
          status=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
            "$$WEBHOOK_URL" -d "Body=test" || echo "000")
          if [ "$$status" = "403" ]; then
            echo "smoke OK: webhook returns 403 (expected — no signature)"
            exit 0
          fi
          echo "smoke retry $$i/5: expected 403, got $$status"
          sleep 15
        done
        echo "smoke test FAILED after 5 attempts (last status: $$status)"
        exit 1
    waitFor: [deploy-api, deploy-whatsapp-bot]

  # =========================================================================
  # Sprint 2c-B T3 — Auth Blocking Function (Cloud Function Gen 1)
  # =========================================================================
  # Build the auth-blocking-functions workspace artifact via tsup (ESM
  # workspace source → CommonJS dist/index.js + synthetic dist/package.json
  # with runtime deps). Deploys via gcloud functions deploy --no-gen2
  # targeting Identity Platform `beforeCreate` trigger. Per ADR-054 +
  # Sprint 2c-B plan v4 T3 + DA G-03 atomic-deploy contract.
  #
  # T3-fix (2026-05-28): three steps gated behind _AUTH_BLOCKING_DEPLOY
  # substitution (default 'false', exact-match lowercase 'true' required).
  # Per T6 runbook §2 this lane runs only as Step 2 of the T8 deploy
  # procedure: `gcloud builds submit --substitutions=_AUTH_BLOCKING_DEPLOY=true,...`.
  # Auto-triggered push-to-main builds skip the lane entirely.
  # `${_AUTH_BLOCKING_DEPLOY}` below is a Cloud Build substitution
  # expanded at YAML parse time, not a bash variable — DO NOT change to
  # `$$_AUTH_BLOCKING_DEPLOY` or wrap in an `env:` block.
  - id: build-auth-blocking
    name: node:20-bookworm
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_AUTH_BLOCKING_DEPLOY}" != "true" ]; then
          echo "SKIP build-auth-blocking: _AUTH_BLOCKING_DEPLOY='${_AUTH_BLOCKING_DEPLOY}' (default 'false'). Invoke T6 runbook §2 with --substitutions=_AUTH_BLOCKING_DEPLOY=true (exact lowercase) to run."
          exit 0
        fi
        corepack enable
        corepack prepare pnpm@9.15.4 --activate
        pnpm install --frozen-lockfile --filter='@booster-ai/auth-blocking-functions...'
        pnpm --filter @booster-ai/auth-blocking-functions build
        ls -la apps/auth-blocking-functions/dist
    waitFor: ['-']

  - id: deploy-auth-blocking
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_AUTH_BLOCKING_DEPLOY}" != "true" ]; then
          echo "SKIP deploy-auth-blocking: _AUTH_BLOCKING_DEPLOY='${_AUTH_BLOCKING_DEPLOY}'."
          exit 0
        fi
        # T3-fix P1-5: guard against terraform state drift. Cloud Function
        # MUST already exist (created by T6 runbook §2 Step 1 terraform apply
        # -target=google_cloudfunctions_function.before_create). If it
        # doesn't, gcloud would CREATE it outside terraform state.
        if ! gcloud functions describe beforeCreate \
              --region=us-east1 \
              --project=booster-ai-494222 \
              --format='value(name)' > /dev/null 2>&1; then
          echo "FAIL: Cloud Function 'beforeCreate' does not exist in us-east1. Run T6 runbook §2 Step 1 (terraform apply -target=google_cloudfunctions_function.before_create) before invoking this step."
          exit 1
        fi
        gcloud functions deploy beforeCreate \
          --no-gen2 \
          --runtime=nodejs20 \
          --source=apps/auth-blocking-functions/dist \
          --entry-point=beforeCreate \
          --region=us-east1 \
          --no-allow-unauthenticated \
          --max-instances=5 \
          --min-instances=0 \
          --trigger-http \
          --project=booster-ai-494222
    waitFor: [build-auth-blocking]

  # DA v2 G-03 atomic-deploy fix: post-deploy verification — gcloud
  # functions describe MUST return non-empty sourceArchiveUrl + status
  # ACTIVE. Failure here blocks downstream IdP wire (T5 terraform apply
  # checks this via T7b CI workflow before merging the wire PR).
  - id: verify-auth-blocking-deployed
    name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        if [ "${_AUTH_BLOCKING_DEPLOY}" != "true" ]; then
          echo "SKIP verify-auth-blocking-deployed: _AUTH_BLOCKING_DEPLOY='${_AUTH_BLOCKING_DEPLOY}'."
          exit 0
        fi
        DESC=$$(gcloud functions describe beforeCreate \
          --region=us-east1 \
          --project=booster-ai-494222 \
          --format=json)
        SRC=$$(echo "$$DESC" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sourceArchiveUrl',''))")
        ST=$$(echo "$$DESC" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))")
        if [ -z "$$SRC" ]; then echo "FAIL: empty sourceArchiveUrl"; exit 1; fi
        if [ "$$ST" != "ACTIVE" ]; then echo "FAIL: status=$$ST (expected ACTIVE)"; exit 1; fi
        echo "OK: function ACTIVE with sourceArchiveUrl=$$SRC"
    waitFor: [deploy-auth-blocking]

substitutions:
  _REGION: southamerica-west1
  _REGISTRY: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers
  _COMMIT_SHA: manual

  # Sprint 2b T13-fix (2026-05-28): 12-char SHA for canary traffic tag.
  # Cloud Run limit: tag + service name ≤ 46 chars. Tag prefix
  # `canary-signup-` (14) + service `booster-ai-api` (14) = 28 chars
  # fixed → SHA portion ≤ 18 chars. 12 chosen for collision resistance
  # while keeping a 6-char headroom. Placeholder default '0000000000aa'
  # (12 chars, lexically valid). release.yml passes the real value
  # `cut -c1-12` from github.sha; T6 runbook §2 Step 2 manual
  # invocation must also pass `_COMMIT_SHA_SHORT=$(git rev-parse --short=12 HEAD)`.
  _COMMIT_SHA_SHORT: '0000000000aa'

  # Sprint 2c-B T3-fix (2026-05-28): gate auth-blocking deploy lane.
  # Default 'false' = auto-triggered push-to-main builds skip the lane.
  # Override to 'true' only when invoking Step 2 of T8 deploy procedure
  # per docs/qa/google-blocking-function-runbook.md §2.
  _AUTH_BLOCKING_DEPLOY: 'false'

  # apps/web build-time vars — Firebase web config (públicas por diseño,
  # ver apps/web/Dockerfile para rationale). Estas claves viajan en el
  # bundle al cliente; la seguridad la dan Firebase Security Rules + el
  # dominio autorizado en Firebase Auth. Por eso se hardcodean acá en
  # vez de pasarse via Secret Manager.
