# Cloud Build pipeline — production
#
# Triggered desde GitHub Actions release.yml tras manual approval en el environment
# `production`. Sin canary/split traffic por ahora (post-staging environment real,
# task backlog #43). Al desplegar, el tráfico va 100% a la nueva revisión.
#
# Scope del thin slice (Fase 6):
#   - Build + deploy de apps/api y apps/whatsapp-bot
#   - apps/web, apps/marketing y demás services Cloud Run quedan con su
#     imagen placeholder hasta que tengan código real (slice siguiente)

steps:
  # =========================================================================
  # Build images en paralelo
  # =========================================================================
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/api/Dockerfile
      - --tag=${_REGISTRY}/api:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/api:latest
      - .
    waitFor: ['-']

  - id: build-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/whatsapp-bot/Dockerfile
      - --tag=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/whatsapp-bot:latest
      - .
    waitFor: ['-']

  # =========================================================================
  # Push a Artifact Registry
  # =========================================================================
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/api']
    waitFor: [build-api]

  - id: push-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/whatsapp-bot']
    waitFor: [build-whatsapp-bot]

  # =========================================================================
  # Deploy a Cloud Run — reemplaza placeholder gcr.io/cloudrun/placeholder
  #
  # Usamos `services update --image` (no `run deploy`) porque Terraform es
  # el owner único de la config Cloud Run: env vars, secrets, service
  # account, scaling, VPC connector, etc. `gcloud run deploy` sin flags
  # pisa TODA la config y deja el service sin secrets → el bot revienta
  # validando WHATSAPP_ACCESS_TOKEN/APP_SECRET/PHONE_NUMBER_ID.
  # `services update --image` sólo cambia la imagen y preserva el resto.
  # =========================================================================
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-api
      - --image=${_REGISTRY}/api:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-api]

  - id: deploy-whatsapp-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-whatsapp-bot
      - --image=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-whatsapp-bot]

  # =========================================================================
  # Smoke test — ping directamente las URLs *.run.app del Cloud Run
  #
  # Apuntamos al hostname autogenerado (no al subdominio custom) porque el
  # cert managed de api.boosterchile.com depende de DNS y mientras los
  # nameservers de GoDaddy no apunten a Google Cloud DNS, el cert queda
  # FAILED_NOT_VISIBLE. La URL *.run.app siempre funciona con el cert
  # autogestionado por Google, sin depender de configuración de DNS humana.
  #
  # Cuando DNS esté migrado y el managed-cert pase a ACTIVE, podemos
  # opcionalmente añadir un check secundario contra https://api.boosterchile.com
  # para validar que el LB también rutea OK.
  # =========================================================================
  - id: smoke-api-health
    name: gcr.io/cloud-builders/curl
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        # Solo verificamos el bot (entrada pública). El api es privado (IAM)
        # y solo se invoca desde el bot via OIDC token; testearlo requiere
        # auth y no aporta extra al smoke. Bash vars escapadas con dollar-dollar.
        BOT_URL="https://booster-ai-whatsapp-bot-469283083998.southamerica-west1.run.app"

        # Twilio webhook con POST sin firma debe devolver 403. Eso confirma
        # que el bot está serving y validando firmas Twilio.
        for i in 1 2 3 4 5; do
          status=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
            "$$BOT_URL/webhooks/whatsapp" -d "Body=test" || echo "000")
          if [ "$$status" = "403" ]; then
            echo "twilio webhook OK (returns 403 without signature as expected)"
            exit 0
          fi
          echo "smoke retry $$i/5: expected 403, got $$status"
          sleep 15
        done
        echo "smoke test FAILED after 5 attempts (last status: $$status)"
        exit 1
    waitFor: [deploy-api, deploy-whatsapp-bot]

substitutions:
  _REGION: southamerica-west1
  _REGISTRY: southamerica-west1-docker.pkg.dev/booster-ai-494222/containers
  _COMMIT_SHA: manual

images:
  - ${_REGISTRY}/api:${_COMMIT_SHA}
  - ${_REGISTRY}/api:latest
  - ${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
  - ${_REGISTRY}/whatsapp-bot:latest

# Usar el SA github-deployer en lugar del compute default.
# Cuentas nuevas de GCP (post-mayo 2024) ya no dan Editor automático al compute
# SA, por lo que este explicit assignment es requerido.
serviceAccount: projects/booster-ai-494222/serviceAccounts/github-deployer@booster-ai-494222.iam.gserviceaccount.com

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: 2400s
