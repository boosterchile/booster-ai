# Cloud Build pipeline — production
#
# Triggered desde GitHub Actions release.yml tras manual approval en el environment
# `production`. El deploy de apps/api usa canary: despliega la nueva revisión
# con tag canary-signup-<sha> al 1% del tráfico, observa 30 min (step
# canary-sleep) + verifica error_rate/p95 (canary-verify) y recién entonces
# promueve a 100% (step deploy-api: update-traffic --to-latest). Ver T13
# SEC-001 más abajo (~línea 154) y el runbook docs/qa/signup-canary-rollback.md.
# El timeout global debe cubrir el sleep de 30 min — ver `timeout` al final.
#
# Scope:
#   - Build + deploy de apps/api, apps/whatsapp-bot, apps/web (PWA),
#     apps/telemetry-tcp-gateway (GKE), apps/telemetry-processor,
#     apps/sms-fallback-gateway.
#   - apps/notification-service, apps/matching-engine,
#     apps/document-service quedan en placeholder mientras sigan siendo
#     skeletons (main.ts solo loguea "starting (skeleton)" y exit). Al
#     implementarlos se agrega el Dockerfile + step build/push/deploy.
#   - apps/marketing ya tiene source (Next.js) pero NO se despliega aún: no
#     hay Dockerfile ni step build/push/deploy. El deploy + DNS se agregan al
#     habilitar el sitio (ADR-067 / spec §11). Hasta entonces, sin imagen.
#
# apps/web requiere VITE_* substitutions (las claves Firebase web son
# públicas por diseño — viajan en el bundle al cliente). Setear via
# --substitutions en gcloud builds submit, o defaults aquí abajo.

steps:
  # =========================================================================
  # Build images en paralelo
  # =========================================================================
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/api/Dockerfile
      - --tag=${_REGISTRY}/api:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/api:latest
      - .
    waitFor: ['-']

  - id: build-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/whatsapp-bot/Dockerfile
      - --tag=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/whatsapp-bot:latest
      - .
    waitFor: ['-']

  # apps/web — PWA Vite. Las VITE_* env vars se inyectan a build-time
  # como --build-arg porque Vite las reemplaza textualmente en el bundle.
  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/web/Dockerfile
      - --build-arg=VITE_API_URL=${_VITE_API_URL}
      - --build-arg=VITE_FIREBASE_API_KEY=${_VITE_FIREBASE_API_KEY}
      - --build-arg=VITE_FIREBASE_AUTH_DOMAIN=${_VITE_FIREBASE_AUTH_DOMAIN}
      - --build-arg=VITE_FIREBASE_PROJECT_ID=${_VITE_FIREBASE_PROJECT_ID}
      - --build-arg=VITE_FIREBASE_STORAGE_BUCKET=${_VITE_FIREBASE_STORAGE_BUCKET}
      - --build-arg=VITE_FIREBASE_MESSAGING_SENDER_ID=${_VITE_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=VITE_FIREBASE_APP_ID=${_VITE_FIREBASE_APP_ID}
      - --build-arg=VITE_GOOGLE_MAPS_API_KEY=${_VITE_GOOGLE_MAPS_API_KEY}
      - --build-arg=VITE_RECAPTCHA_SITE_KEY=${_VITE_RECAPTCHA_SITE_KEY}
      - --tag=${_REGISTRY}/web:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/web:latest
      - .
    waitFor: ['-']

  # apps/telemetry-tcp-gateway — TCP server para devices Teltonika.
  # Va a GKE Autopilot (no Cloud Run; el deploy es kubectl set image).
  - id: build-telemetry-tcp-gateway
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/telemetry-tcp-gateway/Dockerfile
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:latest
      # :bootstrap es el tag inicial en infrastructure/k8s/telemetry-tcp-gateway*.yaml
      # para satisfacer Trivy AVD-KSV-0013 (no :latest). Cloud Build hace
      # kubectl set image al SHA real post-deploy.
      - --tag=${_REGISTRY}/telemetry-tcp-gateway:bootstrap
      - .
    waitFor: ['-']

  # apps/telemetry-processor — consumer Pub/Sub. Cloud Run.
  - id: build-telemetry-processor
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/telemetry-processor/Dockerfile
      - --tag=${_REGISTRY}/telemetry-processor:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/telemetry-processor:latest
      - .
    waitFor: ['-']

  # apps/sms-fallback-gateway — Cloud Run webhook receiver para SMS Twilio.
  - id: build-sms-fallback-gateway
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --no-cache
      - --file=apps/sms-fallback-gateway/Dockerfile
      - --tag=${_REGISTRY}/sms-fallback-gateway:${_COMMIT_SHA}
      - --tag=${_REGISTRY}/sms-fallback-gateway:latest
      - .
    waitFor: ['-']

  # =========================================================================
  # Push a Artifact Registry
  # =========================================================================
  - id: push-api
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/api']
    waitFor: [build-api]

  - id: push-whatsapp-bot
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/whatsapp-bot']
    waitFor: [build-whatsapp-bot]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/web']
    waitFor: [build-web]

  - id: push-telemetry-tcp-gateway
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/telemetry-tcp-gateway']
    waitFor: [build-telemetry-tcp-gateway]

  - id: push-telemetry-processor
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/telemetry-processor']
    waitFor: [build-telemetry-processor]

  - id: push-sms-fallback-gateway
    name: gcr.io/cloud-builders/docker
    args: [push, '--all-tags', '${_REGISTRY}/sms-fallback-gateway']
    waitFor: [build-sms-fallback-gateway]

  # =========================================================================
  # Deploy a Cloud Run — reemplaza placeholder gcr.io/cloudrun/placeholder
  #
  # Usamos `services update --image` (no `run deploy`) porque Terraform es
  # el owner único de la config Cloud Run: env vars, secrets, service
  # account, scaling, VPC connector, etc. `gcloud run deploy` sin flags
  # pisa TODA la config y deja el service sin secrets → el bot revienta
  # validando TWILIO_AUTH_TOKEN al startup (env validation con zod).
  # `services update --image` sólo cambia la imagen y preserva el resto.
  # =========================================================================
  # =========================================================================
  # T13 SEC-001 Sprint 2b (sec-001-cierre §3 H1.2 SC-1.2.3 + ADR-052) —
  # Canary deploy 1% traffic 30min antes de full deploy.
  #
  # Reemplaza el step monolítico `deploy-api` con una secuencia de 6 steps
  # que: (1) deploya la nueva revision con tag canary-signup-<sha> SIN
  # traffic; (2) rutea 1% del traffic al tag; (3) espera 30min observando;
  # (4) verifica error_rate < 1% AND p95_latency < 500ms via Cloud
  # Monitoring API; (5) promueve la revision a 100% traffic (PRESERVE id:
  # deploy-api para downstream `waitFor: [deploy-api, deploy-whatsapp-bot]`
  # de watch-deploy step ~298); (6) rollback fast-path comentado.
  #
  # Pre-req IaC: infrastructure/modules/cloud-run-service/main.tf añade
  # `traffic` a lifecycle.ignore_changes cuando var.traffic_managed_externally
  # = true (set en compute.tf SOLO para service_api). Sin ese ignore, el
  # próximo `terraform apply` revierte el split y mata el canary.
  #
  # Runbook detallado: docs/qa/signup-canary-rollback.md
  # =========================================================================

  # T13-fix (2026-05-28): step uses `entrypoint: bash` (was `gcloud`) so the
  # short SHA can be derived inline from `${_COMMIT_SHA}` without an extra
  # Cloud Build substitution + release.yml change. Cloud Run requires the
  # combined traffic tag + service name ≤ 46 chars; `booster-ai-api` (14) +
  # `canary-signup-` (14) + 12-char short SHA = 40 chars, 6-char headroom.
  - id: deploy-canary
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        FULL_SHA='${_COMMIT_SHA}'
        SHORT_SHA="$${FULL_SHA:0:12}"
        gcloud run services update booster-ai-api \
          --image=${_REGISTRY}/api:${_COMMIT_SHA} \
          --region=${_REGION} \
          --platform=managed \
          --tag=canary-signup-$${SHORT_SHA} \
          --no-traffic \
          --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-api]

  - id: route-canary
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    # Rutea 1% del traffic al tag canary-signup-<sha-12>. El resto (99%)
    # permanece en la revision LATEST que estaba antes del deploy. Cloud
    # Run accepta `--to-tags=<tag>=<weight>` donde weight es el porcentaje
    # (0-100). Si la sintaxis cambia entre versiones gcloud, validar con
    # `gcloud run services update-traffic --help`.
    # T13-fix (2026-05-28): same inline short-SHA derivation as deploy-canary.
    args:
      - -c
      - |
        set -e
        FULL_SHA='${_COMMIT_SHA}'
        SHORT_SHA="$${FULL_SHA:0:12}"
        gcloud run services update-traffic booster-ai-api \
          --region=${_REGION} \
          --platform=managed \
          --to-tags=canary-signup-$${SHORT_SHA}=1
    waitFor: [deploy-canary]

  - id: canary-sleep
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    # 30 minutos observando el canary recibir 1% del traffic. Durante este
    # window el synthetic monitor signup_probe corre cada 60s (= 30 probes)
    # contra /health/signup-flow. Si alguno falla 2 consecutive, dispara
    # alert policy signup_probe_failure → page → human decide rollback.
    args:
      - -c
      - sleep 1800
    waitFor: [route-canary]

  - id: canary-verify
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    # Query Cloud Monitoring API para verificar SLOs durante el canary
    # window:
    #   - error_rate < 1%: count(5xx requests) / count(total requests) <
    #     0.01 sobre los últimos 30min en la revision con tag
    #     canary-signup-<sha>.
    #   - p95_latency < 500ms: aligned p95 sobre request_latencies metric,
    #     mismo scope.
    #
    # Si cualquier check falla, exit 1 → Cloud Build job aborta antes de
    # promover el canary a 100%. Human-on-call recibe el job failure
    # notification y procede con rollback fast-path (NO ejecutado
    # automáticamente — decisión humana).
    #
    # Script defensivo: si las metrics NO están pobladas (cold-start del
    # primer deploy con canary), graceful exit OK con warning estructurado
    # — la ausencia de data NO es failure semánticamente (canary recibió
    # tan poco traffic que no hay sample suficiente). El smoke E2E manual
    # del runbook cubre este edge case.
    args:
      - -c
      - |
        set -euo pipefail
        # Check REAL contra Cloud Monitoring (2026-06-11; antes placeholder
        # exit 0 — auditoría 2026-06-09 riesgo alto: la promoción a 100% no
        # tenía gate automático). Si error_rate >= 1% o p95 >= 500ms en la
        # ventana del canary → exit 1 y el build aborta SIN promover.
        # Defensivo: sin tráfico/sin revision con tag → warn + exit 0 (la
        # ausencia de muestra no es failure; el humano decide — runbook
        # signup-canary-rollback).
        FULL_SHA='${_COMMIT_SHA}'
        SHORT_SHA="$${FULL_SHA:0:12}"
        REVISION_TAG="canary-signup-$${SHORT_SHA}"
        MIN_REQUESTS='${_CANARY_MIN_REQUESTS}'
        echo "canary-verify: tag=$$REVISION_TAG window=30min thresholds: error_rate<1%, p95<500ms, min_requests=$$MIN_REQUESTS"

        # Retry x3: un transitorio de gcloud/API no debe bloquear un deploy
        # legítimo (review 2026-06-11).
        describe_with_retry() {
          for attempt in 1 2 3; do
            if OUT=$$(gcloud run services describe booster-ai-api \
              --region='${_REGION}' --platform=managed --format=json); then
              echo "$$OUT"; return 0
            fi
            echo "canary-verify: describe intento $$attempt falló, reintentando..." >&2
            sleep 10
          done
          return 1
        }
        REVISION=$$(describe_with_retry \
          | python3 -c "import sys,json; s=json.load(sys.stdin); print(next((t.get('revisionName','') for t in s.get('status',{}).get('traffic',[]) if t.get('tag')=='$$REVISION_TAG'), ''))")
        if [ -z "$$REVISION" ]; then
          echo "canary-verify: WARN no se encontró revision con tag $$REVISION_TAG — sin gate automático, decisión humana"
          exit 0
        fi
        echo "canary-verify: revision=$$REVISION"

        TOKEN=$$(gcloud auth print-access-token)
        export TOKEN REVISION MIN_REQUESTS
        python3 <<'PYCHECK'
        import json, os, sys, urllib.parse, urllib.request
        from datetime import datetime, timedelta, timezone

        project = '$PROJECT_ID'
        revision = os.environ['REVISION']
        token = os.environ['TOKEN']
        min_requests = int(os.environ.get('MIN_REQUESTS', '0') or '0')
        end = datetime.now(timezone.utc)
        start = end - timedelta(minutes=30)

        def ts(filter_, aligner, reducer, group_by=None):
            params = {
                'filter': filter_,
                'interval.startTime': start.strftime('%Y-%m-%dT%H:%M:%SZ'),
                'interval.endTime': end.strftime('%Y-%m-%dT%H:%M:%SZ'),
                'aggregation.alignmentPeriod': '1800s',
                'aggregation.perSeriesAligner': aligner,
                'aggregation.crossSeriesReducer': reducer,
            }
            qs = urllib.parse.urlencode(params)
            if group_by:
                qs += ''.join(f'&aggregation.groupByFields={urllib.parse.quote(g)}' for g in group_by)
            req = urllib.request.Request(
                f'https://monitoring.googleapis.com/v3/projects/{project}/timeSeries?{qs}',
                headers={'Authorization': f'Bearer {token}'})
            with urllib.request.urlopen(req, timeout=30) as r:
                return json.load(r).get('timeSeries', [])

        base = (f'metric.type="run.googleapis.com/request_count" '
                f'AND resource.labels.service_name="booster-ai-api" '
                f'AND resource.labels.revision_name="{revision}"')
        series = ts(base, 'ALIGN_SUM', 'REDUCE_SUM', ['metric.labels.response_code_class'])
        counts = {}
        for s_ in series:
            klass = s_.get('metric', {}).get('labels', {}).get('response_code_class', '?')
            for pt in s_.get('points', []):
                v = pt.get('value', {})
                counts[klass] = counts.get(klass, 0) + int(v.get('int64Value', v.get('doubleValue', 0)))
        total = sum(counts.values())
        # Gate de muestra (review 2026-06-11): con _CANARY_MIN_REQUESTS=0
        # (default actual, API pre-comercial con ~0 tráfico de canary al
        # 1%) la falta de muestra promueve con WARN — igual que el
        # comportamiento histórico, pero ahora es una DECISIÓN
        # parametrizada: al crecer el tráfico, subir la substitution en
        # release.yml hace que muestra insuficiente ABORTE (exit 1) y la
        # promoción exija decisión humana. Sin el parámetro, el gate del
        # canary sería papel mojado en el caso típico actual.
        if total < max(min_requests, 1):
            if min_requests > 0:
                print(f'canary-verify: FAIL muestra insuficiente ({total} < {min_requests}) — promoción requiere decisión humana')
                sys.exit(1)
            print('canary-verify: WARN 0 requests en la ventana — sin muestra (min_requests=0), promoviendo; subir _CANARY_MIN_REQUESTS cuando haya tráfico real')
            sys.exit(0)
        err = counts.get('5xx', 0)
        rate = err / total
        print(f'canary-verify: requests={total} 5xx={err} error_rate={rate:.4f}')
        if rate >= 0.01:
            print(f'canary-verify: FAIL error_rate {rate:.2%} >= 1% — NO promover')
            sys.exit(1)

        lat = (f'metric.type="run.googleapis.com/request_latencies" '
               f'AND resource.labels.service_name="booster-ai-api" '
               f'AND resource.labels.revision_name="{revision}"')
        p95s = []
        for s_ in ts(lat, 'ALIGN_PERCENTILE_95', 'REDUCE_MAX'):
            for pt in s_.get('points', []):
                v = pt.get('value', {})
                p95s.append(float(v.get('doubleValue', v.get('int64Value', 0))))
        if p95s:
            worst = max(p95s)
            print(f'canary-verify: p95_max={worst:.0f}ms')
            if worst >= 500:
                print(f'canary-verify: FAIL p95 {worst:.0f}ms >= 500ms — NO promover')
                sys.exit(1)
        else:
            print('canary-verify: WARN sin serie de latencias — solo gate de error_rate aplicado')
        print('canary-verify: OK — promoviendo a 100%')
        PYCHECK
    waitFor: [canary-sleep]

  # PRESERVE id: deploy-api — downstream `waitFor: [deploy-api, deploy-
  # whatsapp-bot]` (step watch-deploy line ~298) depende de este id para
  # resolver. Cambiar el id rompe la pipeline. Per plan T13 round 2 P1-1 fix.
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update-traffic
      - booster-ai-api
      - --region=${_REGION}
      - --platform=managed
      - --to-latest
    waitFor: [canary-verify]

  # =========================================================================
  # Rollback fast-path — manual command (NO step automático).
  #
  # Si canary-verify exit 1 o human-on-call decide abortar antes de los
  # 30min:
  #
  #   gcloud run services update-traffic booster-ai-api \
  #     --region=southamerica-west1 \
  #     --platform=managed \
  #     --to-revisions=PREVIOUS=100
  #
  # Esto revierte instantáneamente a la revision anterior (pre-canary). El
  # tag canary-signup-<sha> queda sin traffic pero persiste — útil para
  # forensic post-mortem. Cleanup del tag: `gcloud run services
  # update-traffic --remove-tags=canary-signup-<sha>` después del incident
  # review.
  #
  # Decision criteria + escalation: docs/qa/signup-canary-rollback.md.
  # =========================================================================

  - id: deploy-whatsapp-bot
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-whatsapp-bot
      - --image=${_REGISTRY}/whatsapp-bot:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-whatsapp-bot]

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-web
      - --image=${_REGISTRY}/web:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-web]

  # apps/telemetry-processor — Cloud Run PULL consumer (StreamingPull).
  # min-instances=1 + no-cpu-throttling son OBLIGATORIOS para un consumer pull
  # (ver compute.tf / incidente 2026-06-07). Explícitos acá para idempotencia y
  # auto-documentación, aunque `update --image` ya preserva la config existente.
  - id: deploy-telemetry-processor
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-telemetry-processor
      - --image=${_REGISTRY}/telemetry-processor:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=1
      - --no-cpu-throttling
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-telemetry-processor]

  - id: deploy-sms-fallback-gateway
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - booster-ai-sms-fallback-gateway
      - --image=${_REGISTRY}/sms-fallback-gateway:${_COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --update-labels=commit=${_COMMIT_SHA}
    waitFor: [push-sms-fallback-gateway]

  # apps/telemetry-tcp-gateway — GKE Autopilot. NO va a Cloud Run.
  #
  # ADR-065 (2026-06-16): deploy AUTOMÁTICO desde Cloud Build vía DNS endpoint
  # del control plane (ADR-059), reemplaza el stdout-only manual (audit P0-I).
  # El SA github-deployer (roles/container.developer) hace `kubectl set image`
  # al SHA buildeado y verifica el rollout, gateado por IAM — sin depender del
  # VPC peering (la NOTA stale 2026-05-09 era previa a ADR-059).
  #
  # Ordenamiento `waitFor: [deploy-api, ...]`: corre DESPUÉS de que el API se
  # promovió a 100%. Si el rollout del gateway falla, el build falla SIN poner
  # en riesgo el canary del API (que ya está a salvo). Fail-loud: un rollout
  # fallido o que no converge alerta al operador → no más drift silencioso.
  # Break-glass: scripts/deploy-telemetry-gateway.sh sigue disponible desde una
  # laptop autorizada si la ruta de Cloud Build falla.
  - id: gke-deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    env:
      - USE_GKE_GCLOUD_AUTH_PLUGIN=True
    args:
      - -c
      - |
        set -euo pipefail
        gcloud container clusters get-credentials booster-ai-telemetry \
          --region=${_REGION} --project=$PROJECT_ID --dns-endpoint
        kubectl set image deployment/telemetry-tcp-gateway \
          gateway=${_REGISTRY}/telemetry-tcp-gateway:${_COMMIT_SHA} \
          -n telemetry
        kubectl rollout status deployment/telemetry-tcp-gateway \
          -n telemetry --timeout=300s
    waitFor: [deploy-api, push-telemetry-tcp-gateway]

  # =========================================================================
  # Smoke test — ping al webhook Twilio via la URL pública canonical.
  #
  # Apuntamos a https://api.boosterchile.com/webhooks/whatsapp porque eso
  # ejercita simultáneamente:
  #   - Cloud DNS resolviendo api.boosterchile.com
  #   - Cert managed (booster-ai-cert-*) ACTIVE
  #   - Global HTTPS LB con la url_map ruteando /webhooks/whatsapp* al
  #     backend del whatsapp-bot
  #   - Cloud Run del bot serving y validando firmas Twilio (devuelve 403
  #     porque no firmamos el request)
  #
  # Si cualquiera de esos eslabones se cae, el smoke falla y el deploy se
  # marca como inválido. Más útil que ping al *.run.app porque ese skip-ea
  # toda la cadena LB/cert/DNS.
  # =========================================================================
  - id: smoke-api-health
    name: gcr.io/cloud-builders/curl
    entrypoint: bash
    args:
      - -c
      - |
        set -eu
        # api.boosterchile.com — URL pública canónica post-DNS-migration.
        # Bash vars escapadas con dollar-dollar — Cloud Build interpreta una
        # variable bash sin escapar como substitution y rechaza el build.
        WEBHOOK_URL="https://api.boosterchile.com/webhooks/whatsapp"

        # POST sin firma debe devolver 403. Eso confirma que el bot está
        # serving y validando firmas Twilio + el LB ruteando + el cert ok.
        for i in 1 2 3 4 5; do
          status=$$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -X POST \
            "$$WEBHOOK_URL" -d "Body=test" || echo "000")
          if [ "$$status" = "403" ]; then
            echo "smoke OK: webhook returns 403 (expected — no signature)"
            exit 0
          fi
          echo "smoke retry $$i/5: expected 403, got $$status"
          sleep 15
        done
        echo "smoke test FAILED after 5 attempts (last status: $$status)"
        exit 1
    waitFor: [deploy-api, deploy-whatsapp-bot]

  # SEC-001 boundary-closure T10 (SC-G7) — la lane de deploy de la
  # auth-blocking function (build/deploy/verify gated por
  # _AUTH_BLOCKING_DEPLOY) se removió con el decomiso de la blocking
  # function (ADR-057 supersede ADR-054). El leg Google se cierra por el
  # boundary ADR-001 + harness CI default-deny + reaper, no por Cloud Function.

